name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build .\Promplet.slnx --configuration Release

      - name: Run tests
        run: dotnet run --project .\Promplet.Tests\Promplet.Tests.csproj --configuration Release
